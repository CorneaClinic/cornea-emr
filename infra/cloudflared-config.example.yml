# Cloudflare Tunnel config — copy to cloudflared-config.yml after setup.
# Generated by scripts/setup-cloudflare-tunnel.ps1
#
# Start manually:
#   cloudflared tunnel --config infra/cloudflared-config.yml run
#
# Prerequisites:
#   cloudflared tunnel login
#   cloudflared tunnel create cornea-clinic

tunnel: cornea-clinic
credentials-file: C:\Users\Hp\.cloudflared\TUNNEL-UUID.json

ingress:
  - hostname: clinic.yourdomain.com
    service: http://127.0.0.1:8080
  - hostname: api.yourdomain.com
    service: http://127.0.0.1:3000
  - service: http_status:404
