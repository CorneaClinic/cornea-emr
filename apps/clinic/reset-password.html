<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Cornea Clinic</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --primary-mid: #1565c0;
      --danger: #c62828;
      --success: #2e7d32;
      --text: #0d1b2a;
      --text-muted: #6b7f96;
      --border: #d0dae8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: linear-gradient(145deg, #0d2137 0%, #1a3a5c 50%, #0f2840 100%);
      color: var(--text);
    }
    .card {
      width: 100%; max-width: 420px; background: #fff; border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35); overflow: hidden;
    }
    .card-header {
      background: var(--primary-mid); color: #fff; padding: 24px; text-align: center;
    }
    .card-header h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .card-header p { margin: 0; opacity: 0.9; font-size: 0.9rem; }
    .card-body { padding: 24px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 1rem; margin-bottom: 14px;
    }
    .btn-primary {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: var(--primary-mid); color: #fff; font-size: 1rem; cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { font-size: 0.85rem; color: var(--text-muted); margin: 0 0 14px; line-height: 1.45; }
    .msg { font-size: 0.9rem; margin-top: 12px; display: none; }
    .msg.error { color: var(--danger); display: block; }
    .msg.success { color: var(--success); display: block; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="card-header">
      <h1><i class="fa-solid fa-lock"></i> Reset password</h1>
      <p>Choose a new cloud account password</p>
    </div>
    <div class="card-body">
      <p class="hint">Minimum 12 characters with uppercase, lowercase, and a number.</p>
      <form id="form">
        <label for="apiUrl">API URL</label>
        <input type="url" id="apiUrl" required autocomplete="off" />
        <label for="password">New password</label>
        <input type="password" id="password" required autocomplete="new-password" minlength="12" />
        <label for="confirm">Confirm new password</label>
        <input type="password" id="confirm" required autocomplete="new-password" minlength="12" />
        <button type="submit" class="btn-primary" id="submitBtn">
          <i class="fa-solid fa-check"></i> Update password
        </button>
      </form>
      <p id="msg" class="msg" aria-live="polite"></p>
      <a class="back" href="Cornea.html"><i class="fa-solid fa-arrow-left"></i> Back to sign in</a>
    </div>
  </div>
  <script src="cornea-auth-pages.js"></script>
  <script>
    const token = CorneaAuthPages.queryParam('token');
    const apiUrlEl = document.getElementById('apiUrl');
    const msgEl = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    CorneaAuthPages.initApiUrlField(apiUrlEl);

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
    }

    if (!token) {
      showMsg('Invalid reset link — no token in the URL. Request a new link from Forgot password.', 'error');
      submitBtn.disabled = true;
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) return;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const policyErr = CorneaAuthPages.validateNewPassword(password);
      if (policyErr) {
        showMsg(policyErr, 'error');
        return;
      }
      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error');
        return;
      }
      msgEl.className = 'msg';
      submitBtn.disabled = true;
      try {
        await CorneaAuthPages.apiPost(
          '/api/v1/auth/password-reset/confirm',
          { token, newPassword: password },
          apiUrlEl.value
        );
        showMsg('Password updated. You can sign in with your new password.', 'success');
        document.getElementById('form').style.display = 'none';
      } catch (err) {
        showMsg(err.message || 'Reset failed. The link may have expired — request a new one.', 'error');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
