<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Cornea Clinic</title>
  <link rel="stylesheet" href="assets/vendor/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/pages/forgot-password.css">
</head>
<body>
  <div class="card" role="main">
    <div class="card-header">
      <h1><i class="fa-solid fa-key"></i> Forgot password</h1>
      <p>Cloud account password reset</p>
    </div>
    <div class="card-body">
      <p class="hint">Enter your clinic cloud email. If an account exists, we will send a reset link (valid for 1 hour).</p>
      <form id="form">
        <label for="apiUrl">API URL</label>
        <input type="url" id="apiUrl" required autocomplete="off" />
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" />
        <button type="submit" class="btn-primary" id="submitBtn">
          <i class="fa-solid fa-paper-plane"></i> Send reset link
        </button>
      </form>
      <p id="msg" class="msg" aria-live="polite"></p>
      <a class="back" href="Cornea.html"><i class="fa-solid fa-arrow-left"></i> Back to sign in</a>
    </div>
  </div>
  <script src="cornea-auth-pages.js"></script>
  <script src="js/pages/forgot-password.js"></script>
</body>
</html>
