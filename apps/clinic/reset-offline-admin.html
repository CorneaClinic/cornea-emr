<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset offline admin — Cornea Clinic</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 48px auto; padding: 0 20px; line-height: 1.5; }
    .card { border: 1px solid #ccc; border-radius: 10px; padding: 20px; background: #fafafa; }
    code { background: #eee; padding: 2px 6px; border-radius: 4px; }
    .creds { margin-top: 16px; padding: 12px; background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    button { margin-top: 12px; padding: 10px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Reset offline administrator</h1>
  <p class="card">Resets the local IndexedDB <code>admin</code> account on <strong>this browser only</strong>. Not available on the public internet site.</p>
  <button type="button" id="resetBtn">Reset admin password</button>
  <div id="out"></div>

  <script src="cornea-auth-env.js"></script>
  <script src="cornea-offline-auth.js"></script>
  <script>
    const out = document.getElementById('out');

    if (window.CorneaAuthEnv?.isPublicDeployment?.()) {
      out.innerHTML = '<p style="color:#c62828;">Blocked: use Cloud Sign In on the public site. This tool is for local development only.</p>';
      document.getElementById('resetBtn').disabled = true;
    }

    function openDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('CorneaClinicDB', 6);
        req.onupgradeneeded = (e) => {
          if (window.CorneaOfflineAuth?.ensureUsersStore) {
            window.CorneaOfflineAuth.ensureUsersStore(e.target.result, e);
          }
        };
        req.onsuccess = () => { window.db = req.result; resolve(); };
        req.onerror = () => reject(req.error);
      });
    }

    function makePassword() {
      const chunk = crypto.randomUUID().replace(/-/g, '').slice(0, 12);
      return chunk + 'Aa1!';
    }

    document.getElementById('resetBtn')?.addEventListener('click', async () => {
      out.textContent = 'Working…';
      try {
        await openDb();
        const password = makePassword();
        const result = await window.CorneaOfflineAuth.resetAdministratorPassword(password, 'admin');
        out.innerHTML = '<div class="creds">Offline admin reset complete.\n\nUsername: ' +
          result.username + '\nPassword: ' + password +
          '\n\nYou will be asked to change this password on first sign-in.</div>';
      } catch (err) {
        out.innerHTML = '<p style="color:#c62828;">' + (err.message || err) + '</p>';
      }
    });
  </script>
</body>
</html>
