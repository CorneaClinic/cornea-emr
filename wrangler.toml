# Cloudflare Workers static assets — Cornea Clinic EMR UI
# Deploy: npm run deploy:clinic
name = "cornea-emr"
compatibility_date = "2024-06-01"
main = "./apps/clinic/clinic-worker.js"

[assets]
directory = "./apps/clinic"
binding = "ASSETS"
# Do NOT use SPA fallback — missing .js files must 404, not return index.html
# (SPA mode silently broke sidebar-nav.js / role-dashboard.js and disabled sections).
not_found_handling = "none"
run_worker_first = true
