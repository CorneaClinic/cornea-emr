# Cloudflare Workers static assets — Cornea Clinic EMR UI
# Deploy: npm run deploy:clinic
name = "cornea-emr"
compatibility_date = "2024-06-01"
main = "./apps/clinic/clinic-worker.js"

[assets]
directory = "./apps/clinic"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
