# G7 — Production health and backup freshness checks (hourly).
name: Production Health

on:
  schedule:
    - cron: '15 * * * *' # :15 past each hour UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-health.yml'
      - 'scripts/production-health-check.ps1'
      - 'apps/clinic/health.json'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: API liveness
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "production-health API liveness — commit ${{ github.sha }}"
          set -e
          for api in "https://corneaclinic-2zfpt.ondigitalocean.app" "${STAGING_API_URL:-}"; do
            [ -z "$api" ] && continue
            base="${api%/}"
            if curl -sf --max-time 30 "$base/health/live" >/dev/null; then
              echo "API live OK: $base"
              exit 0
            fi
            echo "API live failed: $base"
          done
          exit 1

      - name: API readiness (DB)
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          set -e
          for api in "https://corneaclinic-2zfpt.ondigitalocean.app" "${STAGING_API_URL:-}"; do
            [ -z "$api" ] && continue
            base="${api%/}"
            if ! BODY=$(curl -sf --max-time 30 "$base/health" 2>/dev/null); then
              echo "API health fetch failed: $base"
              continue
            fi
            echo "$BODY"
            if echo "$BODY" | grep -q '"ok":true' && echo "$BODY" | grep -q '"database":{"ok":true'; then
              echo "API readiness OK: $base"
              exit 0
            fi
            echo "API health JSON unexpected: $base"
          done
          exit 1

      - name: Clinic UI reachable
        env:
          STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL }}
        run: |
          echo "production-health clinic check v3 — commit ${{ github.sha }}"
          set -e
          UA='Mozilla/5.0 (compatible; CorneaEMR-HealthCheck/1.0; +https://github.com/CorneaClinic/cornea-emr)'
          clinic_ok=0
          for url in \
            "https://corneaclinic.visionemr.net/Cornea/health.json" \
            "https://corneaclinic.visionemr.net/Cornea" \
            "https://corneaclinic.visionemr.net/Cornea/Cornea.html" \
            "${STAGING_CLINIC_URL:-}" \
            "${STAGING_CLINIC_URL:+${STAGING_CLINIC_URL%/}/Cornea.html}" \
            "${STAGING_CLINIC_URL:+${STAGING_CLINIC_URL%/}/health.json}"; do
            [ -z "$url" ] && continue
            code=$(curl -sL -A "$UA" -o /dev/null -w '%{http_code}' --max-time 30 "$url" || echo "000")
            echo "$url -> $code"
            if [ "$code" = "200" ]; then clinic_ok=1; break; fi
          done
          if [ "$clinic_ok" -ne 1 ]; then
            echo "Clinic UI check failed — no candidate URL returned HTTP 200"
            echo "If you see the old one-line curl command above, you re-ran an outdated workflow."
            echo "Use Actions -> Production Health -> Run workflow on branch main (do not Re-run failed jobs)."
            exit 1
          fi
          echo "Clinic UI reachable"

  staging-smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
      STAGING_E2E_EMAIL: ${{ secrets.STAGING_E2E_EMAIL }}
      STAGING_E2E_PASSWORD: ${{ secrets.STAGING_E2E_PASSWORD }}
      STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL || 'https://corneaclinic.visionemr.net/Cornea' }}
      STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Staging smoke (login + clinic load)
        run: |
          if [ -z "$STAGING_E2E_EMAIL" ] || [ -z "$STAGING_E2E_PASSWORD" ]; then
            echo "Skipping — STAGING_E2E_* secrets not configured."
            exit 0
          fi
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e:staging
