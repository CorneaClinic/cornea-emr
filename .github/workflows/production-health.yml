# G7 — Production health checks (hourly).
# API: probed directly on DigitalOcean (reliable from GitHub Actions).
# Clinic UI: Cloudflare often blocks datacenter curl — use staging-smoke (Playwright) or npm run health:production.
name: Production Health

on:
  schedule:
    - cron: '15 * * * *' # :15 past each hour UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-health.yml'
      - 'scripts/production-health-check.ps1'
      - 'apps/clinic/health.json'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: API liveness
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "production-health v4 (API only) — commit ${{ github.sha }}"
          set -e
          for api in "https://corneaclinic-2zfpt.ondigitalocean.app" "${STAGING_API_URL:-}"; do
            [ -z "$api" ] && continue
            base="${api%/}"
            if curl -sf --max-time 30 "$base/health/live" >/dev/null; then
              echo "API live OK: $base"
              exit 0
            fi
            echo "API live failed: $base"
          done
          exit 1

      - name: API readiness (DB)
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          set -e
          for api in "https://corneaclinic-2zfpt.ondigitalocean.app" "${STAGING_API_URL:-}"; do
            [ -z "$api" ] && continue
            base="${api%/}"
            if ! BODY=$(curl -sf --max-time 30 "$base/health" 2>/dev/null); then
              echo "API health fetch failed: $base"
              continue
            fi
            echo "$BODY"
            if echo "$BODY" | grep -q '"ok":true' && echo "$BODY" | grep -q '"database":{"ok":true'; then
              echo "API readiness OK: $base"
              exit 0
            fi
            echo "API health JSON unexpected: $base"
          done
          exit 1

      - name: G6 Redis rate limits (checks.redis.mode=redis)
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        continue-on-error: true
        run: |
          for api in "https://corneaclinic-2zfpt.ondigitalocean.app" "${STAGING_API_URL:-}"; do
            [ -z "$api" ] && continue
            base="${api%/}"
            BODY=$(curl -sf --max-time 30 "$base/health" 2>/dev/null) || continue
            echo "$BODY"
            if echo "$BODY" | grep -q '"redis":{[^}]*"mode":"redis"'; then
              echo "G6 Redis OK: $base"
              exit 0
            fi
            echo "G6 OPEN: Redis not active on $base (deploy health endpoint + REDIS_URL)"
          done
          exit 1

  staging-secrets-reminder:
    runs-on: ubuntu-latest
    needs: health-check
    if: ${{ secrets.STAGING_E2E_EMAIL == '' || secrets.STAGING_E2E_PASSWORD == '' }}
    steps:
      - name: Staging secrets not configured
        run: |
          echo "::warning::STAGING_E2E_* secrets missing — staging-smoke job skipped"
          echo "See docs/DEPLOY_ROLLBACK.md § Staging E2E"

  staging-smoke:
    runs-on: ubuntu-latest
    needs: health-check
    if: ${{ secrets.STAGING_E2E_EMAIL != '' && secrets.STAGING_E2E_PASSWORD != '' }}
    env:
      CI: true
      STAGING_E2E_EMAIL: ${{ secrets.STAGING_E2E_EMAIL }}
      STAGING_E2E_PASSWORD: ${{ secrets.STAGING_E2E_PASSWORD }}
      STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL || 'https://corneaclinic.visionemr.net/Cornea' }}
      STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Staging smoke (clinic load + login)
        run: npm run test:e2e:staging
