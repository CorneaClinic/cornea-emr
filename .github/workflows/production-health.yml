# G7 — Production health and backup freshness checks (hourly).
name: Production Health

on:
  schedule:
    - cron: '15 * * * *' # :15 past each hour UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-health.yml'
      - 'scripts/production-health-check.ps1'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: API liveness
        run: |
          curl -sf --max-time 30 \
            "${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}/health/live"

      - name: API readiness (DB)
        run: |
          BODY=$(curl -sf --max-time 30 \
            "${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}/health")
          echo "$BODY"
          echo "$BODY" | grep -q '"ok":true'
          echo "$BODY" | grep -q '"database":{"ok":true'

      - name: Clinic UI reachable
        env:
          STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL }}
        run: |
          set -euo pipefail
          # Always try canonical production URLs; STAGING_CLINIC_URL may be unset or misconfigured.
          urls=()
          add_url() {
            local u="${1%/}"
            [ -z "$u" ] && return
            case " ${urls[*]} " in *" $u "*) return ;; esac
            urls+=("$u")
          }
          add_url "${STAGING_CLINIC_URL:-}"
          add_url "https://corneaclinic.visionemr.net/Cornea"
          add_url "https://corneaclinic.visionemr.net"
          ok=0
          for base in "${urls[@]}"; do
            for suffix in "" "/Cornea.html"; do
              target="${base}${suffix}"
              code=$(curl -sL -o /dev/null -w '%{http_code}' --max-time 30 "$target" || echo "000")
              echo "$target -> $code"
              if [ "$code" = "200" ]; then ok=1; break 2; fi
            done
          done
          if [ "$ok" -ne 1 ]; then
            echo "Clinic UI check failed — no candidate URL returned HTTP 200"
            exit 1
          fi
          echo "Clinic UI reachable"

  staging-smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
      STAGING_E2E_EMAIL: ${{ secrets.STAGING_E2E_EMAIL }}
      STAGING_E2E_PASSWORD: ${{ secrets.STAGING_E2E_PASSWORD }}
      STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL || 'https://corneaclinic.visionemr.net/Cornea' }}
      STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Staging smoke (login + clinic load)
        run: |
          if [ -z "$STAGING_E2E_EMAIL" ] || [ -z "$STAGING_E2E_PASSWORD" ]; then
            echo "Skipping — STAGING_E2E_* secrets not configured."
            exit 0
          fi
          npm ci
          npx playwright install chromium --with-deps
          npm run test:e2e:staging
