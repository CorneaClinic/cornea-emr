# Nightly regression — local stack (same as PR) + optional live staging smoke.
name: E2E Nightly

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  workflow_dispatch:

jobs:
  playwright-local:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cornea
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cornea_emr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cornea -d cornea_emr_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgres://cornea:test@127.0.0.1:5432/cornea_emr_test
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-long!!
      SECRETS_ENCRYPTION_KEY: ci-encryption-key-32-characters-min!!
      CORS_ORIGIN: http://127.0.0.1:8080
      E2E_PASSWORD: Playwright-E2e-Test1!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json
      - name: Install API dependencies
        run: npm ci
        working-directory: apps/api
      - name: Install root dependencies (Playwright)
        run: npm ci
        working-directory: .
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
        working-directory: .
      - name: Playwright regression suite
        run: npm run test:e2e
        working-directory: .

  staging-smoke:
    runs-on: ubuntu-latest
    env:
      CI: true
      STAGING_E2E_EMAIL: ${{ secrets.STAGING_E2E_EMAIL }}
      STAGING_E2E_PASSWORD: ${{ secrets.STAGING_E2E_PASSWORD }}
      STAGING_CLINIC_URL: ${{ vars.STAGING_CLINIC_URL || 'https://corneaclinic.visionemr.net/Cornea' }}
      STAGING_API_URL: ${{ vars.STAGING_API_URL || 'https://corneaclinic-2zfpt.ondigitalocean.app' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
        working-directory: .
      - run: npx playwright install chromium --with-deps
        working-directory: .
      - name: Live staging smoke (browser)
        run: |
          if [ -z "$STAGING_E2E_EMAIL" ] || [ -z "$STAGING_E2E_PASSWORD" ]; then
            echo "Skipping staging smoke — add STAGING_E2E_EMAIL and STAGING_E2E_PASSWORD repository secrets."
            exit 0
          fi
          npx playwright test e2e/staging-smoke.spec.js
        working-directory: .
